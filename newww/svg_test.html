<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #431616; padding: 50px; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .logo-container { width: 400px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" width="100%" height="100%">
      <defs>
        <style>
          .cursive { font-family: 'Dancing Script', cursive; font-size: 85px; fill: #39a737; font-weight: bold; }
          .tagline { font-family: sans-serif; font-size: 13px; font-weight: bold; fill: #d53127; letter-spacing: 0.5px; }
        </style>
      </defs>

      <g transform="translate(10, 20)">
        <!-- Far Left Red -->
        <path d="M 12 18 C 15 40 12 60 17 78 L 30 78 C 25 55 25 35 34 15 Z" fill="#cb3123"/>
        <!-- Dark Brown -->
        <path d="M 37 14 C 30 35 29 55 33 78 L 47 78 C 45 55 46 35 56 10 Z" fill="#5c2a1c"/>
        <!-- Orange Brown -->
        <path d="M 59 8 C 50 30 49 55 52 78 L 68 78 C 65 55 69 32 81 5 Z" fill="#af5932"/>
        <!-- Light Orange -->
        <path d="M 85 3 C 74 25 73 50 73 78 L 88 78 L 100 0 Z" fill="#f58232"/>
      </g>

      <!-- The "f" cart base and handle -->
      <!-- Smooth, thicker curve for the 'f' stem and bottom platform -->
      <path d="M 100 5 C 115 -5 125 5 125 15 C 125 22 118 25 112 25 C 105 25 105 35 105 45 L 98 90 C 97 98 92 102 85 102 L 20 102 C 15 102 12 98 12 94 C 12 90 15 86 20 86 L 82 86 L 88 45 C 88 30 92 15 100 5 Z" fill="#39a737"/>
      <!-- Crossbar of 'f' -->
      <path d="M 102 40 L 125 40 C 130 40 130 48 125 48 L 100 48 Z" fill="#39a737"/>

      <!-- Wheels -->
      <circle cx="35" cy="110" r="10" fill="#39a737"/>
      <circle cx="75" cy="110" r="10" fill="#39a737"/>

      <!-- 'mcc' text -->
      <!-- Slightly overlapping the 'f' -->
      <text x="110" y="102" class="cursive">mcc</text>

      <!-- Tagline -->
      <text x="10" y="155" class="tagline">Freshness You Deserve, Quality You Trust.</text>
    </svg>
  </div>
</body>
</html>
